name: Generate Weekly Meals

on:
  # Run every Tuesday at 8 PM Perth time (12 PM UTC)
  schedule:
    - cron: '0 12 * * 2'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      coles_saleid:
        description: 'Coles WA Metro saleId'
        required: false
        default: '66019'
      woolies_saleid:
        description: 'Woolworths WA saleId'
        required: false
        default: '66046'

jobs:
  generate-meals:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright
        playwright install chromium
    
    - name: Run meal generator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_EMAIL: ${{ secrets.COMMIT_EMAIL || 'docket-bot@example.com' }}
        COLES_SALEID: ${{ inputs.coles_saleid || '66019' }}
        WOOLIES_SALEID: ${{ inputs.woolies_saleid || '66046' }}
        REPO_PATH: ${{ github.workspace }}
      run: python3 generate-thisweek.py
    
    - name: Commit and push
      if: success()
      run: |
        git config user.name "Docket Bot"
        git config user.email "docket-bot@example.com"
        git add thisweek.json
        git commit -m "Weekly update: $(date -d 'next wednesday' +'%a %d %b')" || echo "No changes"
        git push
